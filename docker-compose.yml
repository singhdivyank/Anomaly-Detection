version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: grid-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: grid-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgresql-timescale:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: grid-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: grid_analytics
      POSTGRES_USER: grid_admin
      POSTGRES_PASSWORD: grid_admin_pw
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid_admin -d grid_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-inference:
    build:
      context: ./ml-inference
    container_name: grid-ml-inference
    ports:
      - "8000:8000"
    volumes:
      - ./ml-inference/models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-backend:
    build:
      context: ./core-backend
    container_name: grid-core-backend
    depends_on:
      kafka:
        condition: service_healthy
      postgresql-timescale:
        condition: service_healthy
      ml-inference:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql-timescale:5432/grid_analytics
      SPRING_DATASOURCE_USERNAME: grid_admin
      SPRING_DATASOURCE_PASSWORD: grid_admin_pw
      ML_INFERENCE_BASE_URL: http://ml-inference:8000

  iot-simulator:
    build:
      context: ./iot-simulator
    container_name: grid-iot-simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: smart-meter-telemetry
      CSV_PATH: /data/smart_meter_data.csv
      STREAM_RATE_MS: "200"
    volumes:
      - ./iot-simulator/data:/data:ro

volumes:
  timescale_data:
