server:
  port: 8080

spring:
  application:
    name: core-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/grid_analytics}
    username: ${SPRING_DATASOURCE_USERNAME:grid_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:grid_admin_pw}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: core-backend-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "com.grid.analytics.dto"
    listener:
      ack-mode: MANUAL
      concurrency: 3

grid:
  kafka:
    topic: smart-meter-telemetry
    dlt-suffix: ".DLT"
  ml-inference:
    base-url: ${ML_INFERENCE_BASE_URL:http://localhost:8000}
    predict-path: /api/v1/predict
    timeout-ms: 2000
  websocket:
    endpoint: /grid-ws-broker
    allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.grid.analytics: INFO
    org.springframework.kafka: WARN
